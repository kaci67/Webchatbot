<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Můj Chatbot ♥</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fff0f5;
      --surface: #fff5f8;
      --surface2: #ffe4ee;
      --border: rgba(255,105,150,0.18);
      --accent: #f472b6;
      --accent2: #fb7bb8;
      --user-bubble: #fce7f3;
      --bot-bubble: #fff0f7;
      --text: #6b1a3a;
      --muted: #c77da0;
      --send-btn: #f472b6;
    }

    body {
      font-family: 'Syne', 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .wrapper {
      width: 100%;
      max-width: 680px;
      height: min(90dvh, 760px);
      display: flex;
      flex-direction: column;
      border: 1.5px solid #f9a8d4;
      border-radius: 24px;
      overflow: hidden;
      background: var(--surface);
      box-shadow: 0 4px 32px rgba(244,114,182,0.10);
      position: relative;
    }

    header {
      padding: 1.1rem 1.5rem;
      background: var(--surface2);
      border-bottom: 1.5px solid #f9a8d4;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .avatar {
      width: 42px; height: 42px;
      border-radius: 50%;
      background: #f472b6;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
      border: 2px solid #fbb6d8;
    }

    .hearts-deco {
      font-size: 13px;
      color: #f472b6;
      letter-spacing: 3px;
      display: flex; align-items: center; gap: 4px;
    }

    header h1 {
      font-size: 1.05rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #be185d;
    }

    header p {
      font-size: 0.72rem;
      color: var(--muted);
      font-family: 'DM Mono', monospace;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem 1.25rem 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 10px;
      scroll-behavior: smooth;
      background: repeating-linear-gradient(0deg, transparent, transparent 39px, #fce7f320 40px);
    }

    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: #f9a8d4; border-radius: 4px; }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 78%;
      animation: pop 0.18s ease;
    }

    @keyframes pop {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.bot  { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 0.6rem 1rem;
      border-radius: 18px;
      font-size: 0.93rem;
      line-height: 1.55;
      word-break: break-word;
      font-family: 'DM Mono', 'Courier New', monospace;
    }

    .user .bubble {
      background: #fbcfe8;
      border-bottom-right-radius: 5px;
      color: #831843;
      border: 1px solid #f9a8d4;
    }

    .bot .bubble {
      background: var(--bot-bubble);
      border: 1.5px solid #f9a8d4;
      border-bottom-left-radius: 5px;
      color: var(--text);
    }

    .label {
      font-size: 0.67rem;
      color: var(--muted);
      margin: 3px 4px 0;
      font-family: 'DM Mono', monospace;
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .label .hrt { color: #f472b6; font-size: 10px; }

    .time-tag {
      font-size: 0.63rem;
      color: #e879b8;
      font-family: 'DM Mono', monospace;
      margin-top: 2px;
    }

    .teach-box {
      background: #fff0f7;
      border: 1.5px solid #f472b6;
      border-radius: 16px;
      padding: 0.85rem 1rem;
      font-size: 0.85rem;
      color: #be185d;
      display: flex;
      flex-direction: column;
      gap: 8px;
      animation: pop 0.18s ease;
      max-width: 90%;
    }

    .teach-box p { color: #6b1a3a; font-family: 'DM Mono', monospace; font-size: 0.82rem; }
    .teach-box label { font-size: 0.78rem; color: var(--muted); font-family: 'DM Mono', monospace; }

    .teach-box input[type="text"] {
      width: 100%;
      padding: 0.5rem 0.75rem;
      background: #fff5f8;
      border: 1.5px solid #f9a8d4;
      border-radius: 10px;
      color: #6b1a3a;
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      outline: none;
      transition: border 0.15s;
    }

    .teach-box input[type="text"]:focus { border-color: #f472b6; }

    .teach-btn {
      align-self: flex-end;
      padding: 0.42rem 1.1rem;
      background: #f472b6;
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: 'Syne', sans-serif;
      font-size: 0.8rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .teach-btn:hover { opacity: 0.85; }

    footer {
      padding: 0.9rem 1.1rem;
      background: var(--surface2);
      border-top: 1.5px solid #f9a8d4;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-shrink: 0;
    }

    #input {
      flex: 1;
      background: #fff5f8;
      border: 1.5px solid #f9a8d4;
      border-radius: 14px;
      padding: 0.65rem 1rem;
      color: #6b1a3a;
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      outline: none;
      transition: border 0.15s;
    }

    #input::placeholder { color: #e4a5c5; }
    #input:focus { border-color: #f472b6; }

    #sendBtn {
      width: 44px; height: 44px;
      border-radius: 14px;
      border: none;
      background: #f472b6;
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.15s, transform 0.1s;
      flex-shrink: 0;
    }

    #sendBtn:hover { opacity: 0.88; }
    #sendBtn:active { transform: scale(0.95); }

    .hint {
      text-align: center;
      font-size: 0.7rem;
      color: #e4a5c5;
      font-family: 'DM Mono', monospace;
      padding: 0.4rem 0 0.4rem;
      background: var(--surface2);
    }

    .floating-hearts {
      position: absolute;
      pointer-events: none;
      font-size: 11px;
      animation: floatup 1.5s ease-out forwards;
    }

    @keyframes floatup {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-40px) scale(1.4); }
    }
  </style>
</head>
<body>

<div class="wrapper">
  <header>
    <div class="avatar">🧮</div>
    <div style="flex:1;">
      <div style="display:flex; align-items:center; gap:8px;">
        <h1>Můj Chatbot</h1>
        <span class="hearts-deco">♥ ♥ ♥</span>
      </div>
      <p>Učí se z každé nové odpovědi ♡</p>
    </div>
  </header>

  <div id="chat"></div>

  <footer>
    <input id="input" type="text" placeholder="Matika, čeština, nebo jen popovídej… ♡" autocomplete="off" />
    <button id="sendBtn" aria-label="Odeslat">♥</button>
  </footer>

  <p class="hint">♡ Zkus: 12*8 · co jsou slovní druhy · vyjmenovaná slova po B · co je metafora ♡</p>
</div>

<script>
  const odpovedi = {
    // Základní

    "jak se mas": "Mám se dobře! ♡",
    "co delas": "Povídám si s tebou, počítám příklady a učím se česky ♡",
    "co umas": "Umím matematiku, českou gramatiku, vyjmenovaná slova, slovní druhy a spoustu dalšího! ♡",

    // === MATEMATIKA ===
    "co je pi": "Číslo π (pi) ≈ 3.14159265... Je to poměr obvodu kruhu k průměru ♡",
    "co je e": "Eulerovo číslo e ≈ 2.71828... Je to základ přirozeného logaritmu ♡",
    "co je pythagorova veta": "Pythagorova věta: a² + b² = c², kde c je přepona pravoúhlého trojúhelníku ♡",

    "jak se pocita obvod ctverce": "Obvod čtverce = 4 × a (a je délka strany) ♡",
    "jak se pocita obvod obdelniku": "Obvod obdélníku = 2 × (a + b) ♡",
    "jak se pocita obvod trojuhelniku": "Obvod trojúhelníku = a + b + c (součet všech stran) ♡",
    "co je zlomek": "Zlomek vyjadřuje část celku. Skládá se z čitatele (nahoře) a jmenovatele (dole). Např. 3/4 znamená 3 ze 4 dílů ♡",
    "co jsou prvocisla": "Prvočísla jsou čísla dělitelná pouze 1 a sebou samým. Např.: 2, 3, 5, 7, 11, 13, 17, 19, 23... ♡",

    // === SLOVNÍ DRUHY ===
    "co jsou slovni druhy": "Slovní druhy jsou: 1. podstatná jména, 2. přídavná jména, 3. zájmena, 4. číslovky, 5. slovesa, 6. příslovce, 7. předložky, 8. spojky, 9. částice, 10. citoslovce ♡",
    "kolik je slovnich druhu": "V češtině je 10 slovních druhů ♡",
    "co je podstatne jmeno": "Podstatné jméno je slovní druh, který pojmenovává osoby, věci, zvířata nebo jevy. Ptáme se KDO? CO? Např.: pes, dům, láska ♡",
    "co je pridavne jmeno": "Přídavné jméno vyjadřuje vlastnosti podstatných jmen. Ptáme se JAKÝ? KTERÝ? ČÍCÍ? Např.: velký, červený, matčin ♡",
    "co je sloveso": "Sloveso vyjadřuje děj, stav nebo změnu stavu. Ptáme se CO DĚLÁ? Např.: běžet, spát, růst ♡",
    "co je zajmeno": "Zájmeno zastupuje nebo provází podstatné jméno. Např.: já, ty, on, tento, můj ♡",
    "co je cislovka": "Číslovka vyjadřuje počet nebo pořadí. Např.: jeden, pět, třetí, dvojnásobný ♡",
    "co je prislovce": "Příslovce vyjadřuje okolnosti děje (místo, čas, způsob). Ptáme se KDE? KDY? JAK? Např.: rychle, dnes, tady ♡",
    "co je predlozka": "Předložka stojí před podstatným jménem a tvoří s ním předložkový pád. Např.: v, na, pod, před, mezi ♡",
    "co je spojka": "Spojka spojuje slova nebo věty. Např.: a, ale, nebo, protože, když, aby ♡",
    "co je castica": "Částice uvozuje věty nebo vyjadřuje postoj mluvčího. Např.: ano, ne, ať, kéž, prý ♡",

    "co jsou vyjmenovana slova": "Vyjmenovaná slova jsou slova, po jejichž základu píšeme Y/Ý, i když bychom čekali I/Í. Jsou seřazena v řadách po B, F, L, M, P, S, V, Z ♡",
    "vyjmenovana slova po b": "Po B: být, byt, bydlit, bystrý, bylina, Byl, bytel, kobyla, nabýt, zbytek, přibýt, Babylon, dobrý... Úplná řada: být – bydlit – obyvatel – byt – bystrý – bylina – kobyla – býk ♡",
    "vyjmenovana slova po l": "Po L: lyže, lykat, lýko, lýtko, lysý, lysohlávka, lýčí, Lydie ♡",
    "vyjmenovana slova po m": "Po M: my, mýt, mýlit, mýto, mýval, myslit, myš, mýtit, hmyz, nezmýlit ♡",
    "vyjmenovana slova po p": "Po P: pýcha, pytel, pysk, být pyšný, pýr, pytlák, netopýr, slepýš, pyl, kopyto, třpytit ♡",
    "vyjmenovana slova po s": "Po S: syn, sýr, sýkora, sychravý, syrový, syrý, sýček, syčet, usychat, vysýchat ♡",
    "vyjmenovana slova po v": "Po V: vy, výt, výr, vykřiknout, vysoký, výspa, výše, vyžle, zvyknout, žvýkat ♡",
    "vyjmenovana slova po z": "Po Z: brzy, jazyk, nazývat, Zbýšov, zezhora, nazpět ♡",

    // === PÁDY ===
    "co jsou pady": "Pády jsou: 1. nominativ (kdo, co), 2. genitiv (koho, čeho), 3. dativ (komu, čemu), 4. akuzativ (koho, co), 5. vokativ (oslovení), 6. lokál (o kom, o čem), 7. instrumentál (kým, čím) ♡",
    "kolik je padu": "V češtině je 7 pádů: nominativ, genitiv, dativ, akuzativ, vokativ, lokál, instrumentál ♡",
    "co je nominativ": "1. pád – nominativ. Ptáme se KDO? CO? Je to základní tvar slova, podmět věty ♡",
    "co je genitiv": "2. pád – genitiv. Ptáme se KOHO? ČEHO? Např.: bez vody, do školy ♡",
    "co je dativ": "3. pád – dativ. Ptáme se KOMU? ČEMU? Např.: dát bratrovi, jít k moři ♡",
    "co je akuzativ": "4. pád – akuzativ. Ptáme se KOHO? CO? Např.: vidím psa, čtu knihu ♡",
    "co je vokatív": "5. pád – vokativ. Používá se při oslovení. Např.: Karle! Mami! Ahoj, Petře! ♡",
    "co je lokal": "6. pád – lokál. Ptáme se O KOM? O ČEM? Vždy s předložkou. Např.: mluvit o příteli ♡",
    "co je instrumental": "7. pád – instrumentál. Ptáme se KÝM? ČÍM? Např.: jet autobusem, psát tužkou ♡",

    // === VĚTNÉ ČLENY ===
    "co jsou vetne cleny": "Větné členy jsou: podmět, přísudek, předmět, příslovečné určení, přívlastek, doplněk ♡",
    "co je podmet": "Podmět je větný člen, který označuje původce děje. Ptáme se KDO? CO? dělá přísudek. Bývá v 1. pádu ♡",
    "co je prisudek": "Přísudek je nejdůležitější větný člen — říká, co podmět dělá nebo jaký je. Vyjádřen slovesem ♡",
    "co je predmet": "Předmět rozvíjí sloveso a odpovídá na otázky pádů (kromě 1. a 5.). Např.: čtu knihu (4. pád) ♡",
    "co je privlastek": "Přívlastek rozvíjí podstatné jméno a vyjadřuje jeho vlastnost. Ptáme se JAKÝ? KTERÝ? ♡",
    "co je prislovecne urceni": "Příslovečné určení vyjadřuje okolnosti děje: místo (kde), čas (kdy), způsob (jak), příčinu (proč) ♡",

    // === INTERPUNKCE ===
    "kdy se pise carka pred ze": "Před spojkou ŽE se vždy píše čárka, protože uvozuje vedlejší větu. Např.: Řekl, že přijde ♡",
    "kdy se pise carka pred a": "Před spojkou A se čárka nepíše, pokud spojuje dva větné členy. Píše se, pokud jsou věty v protikladu nebo odděluje vedlejší větu. Např.: Šel domů, a přesto byl smutný ♡",
    "kdy se pise carka pred ale": "Před spojkou ALE se vždy píše čárka. Např.: Chtěl jsem jít, ale nemohl jsem ♡",
    "kdy se pise carka pred kdyz": "Před KDYŽ se píše čárka, pokud uvozuje vedlejší větu za větou hlavní. Např.: Přišel jsem, když bylo pozdě ♡",

    // === PRAVOPIS ===
    "kdy piseme i po c": "Po C píšeme vždy I/Í, nikdy Y. Např.: cíl, cibule, pocit, ulice ♡",
    "kdy piseme i po z": "Po Z se řídíme vyjmenovanými slovy a jejich příbuznými. Jinak píšeme I. Např.: zima, zítra, zisk ♡",
    "co je velke pismeno": "Velké písmeno píšeme: na začátku věty, u vlastních jmen (Jan, Praha), u názvů institucí, svátků a titulů před jménem ♡",
    "kdy piseme ne zvlast": "NE píšeme zvlášť od sloves (ne jít, ne spát) a od přídavných jmen tvořených příponou -ný/-ní. Dohromady: nespokojenost, neschopný ♡",

    // === LITERATURA ===
    "kdo napsal babicku": "Babičku napsal/a Božena Němcová, vydáno roku 1855. Jde o jedno z nejznámějších děl české literatury ♡",
    "kdo napsal staré povesti ceske": "Staré pověsti české napsal Alois Jirásek, vydáno roku 1894 ♡",
    "kdo napsal maly princ": "Malého prince napsal Antoine de Saint-Exupéry, francouzský spisovatel. Vydáno 1943 ♡",
    "co je metafora": "Metafora je přenesení pojmenování na základě podobnosti. Např.: zlaté srdce, kamenná tvář, moře slz ♡",
    "co je personifikace": "Personifikace je přiřazení lidských vlastností neživým věcem nebo zvířatům. Např.: slunce se usmívá, vítr zpívá ♡",
    "co je prirovnani": "Přirovnání srovnává dvě věci pomocí slov jako, jako by, podobný. Např.: silný jako lev, bílý jako sníh ♡",
    "co je ryma": "Rým je shoda hlásek na konci veršů. Druhy: sdružený (AABB), střídavý (ABAB), obkročný (ABBA) ♡",
  };

  let teachingMode = false;
  let pendingMessage = "";

  const chat = document.getElementById("chat");
  const input = document.getElementById("input");
  const sendBtn = document.getElementById("sendBtn");

  function getTime() {
    const now = new Date();
    return now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
  }

  function addMsg(text, who) {
    const wrap = document.createElement("div");
    wrap.className = "msg " + who;
    const label = document.createElement("div");
    label.className = "label";
    label.innerHTML = who === "user"
      ? '<span class="hrt">♥</span> Ty'
      : '<span class="hrt">♥</span> Chatbot';
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = text;
    const timeEl = document.createElement("div");
    timeEl.className = "time-tag";
    timeEl.textContent = getTime();
    wrap.appendChild(bubble);
    wrap.appendChild(label);
    wrap.appendChild(timeEl);
    chat.appendChild(wrap);
    chat.scrollTop = chat.scrollHeight;
  }

  function showTeachBox() {
    const box = document.createElement("div");
    box.className = "teach-box";
    box.id = "teachBox";
    box.innerHTML = `
      <p>🤔 Tomu nerozumím. Jak mám odpovědět na <strong style="color:#f472b6">"${pendingMessage}"</strong>? ♡</p>
      <label>Naučte mě odpověď:</label>
      <input type="text" id="teachInput" placeholder="Vaše odpověď… ♡" />
      <button class="teach-btn" id="teachSave">Uložit odpověď ♥</button>
    `;
    chat.appendChild(box);
    chat.scrollTop = chat.scrollHeight;
    document.getElementById("teachInput").addEventListener("keydown", e => {
      if (e.key === "Enter") saveTeach();
    });
    document.getElementById("teachSave").addEventListener("click", saveTeach);
    document.getElementById("teachInput").focus();
  }

  function saveTeach() {
    const val = document.getElementById("teachInput").value.trim();
    if (!val) return;
    odpovedi[pendingMessage] = val;
    document.getElementById("teachBox").remove();
    addMsg("Díky, už si to pamatuju! ♥ 🧠", "bot");
    teachingMode = false;
    pendingMessage = "";
    input.focus();
  }

  function spawnHeart() {
    const h = document.createElement("span");
    h.className = "floating-hearts";
    h.textContent = ["♥","♡","💕","♥","♡"][Math.floor(Math.random()*5)];
    h.style.left = (30 + Math.random()*300) + "px";
    h.style.bottom = "60px";
    h.style.color = ["#f472b6","#fb923c","#f9a8d4","#ec4899"][Math.floor(Math.random()*4)];
    document.querySelector(".wrapper").appendChild(h);
    setTimeout(() => h.remove(), 1600);
  }

  // Normalizace diakritiky pro porovnávání
  function normalize(s) {
    return s.toLowerCase()
      .replace(/á/g,'a').replace(/č/g,'c').replace(/ď/g,'d')
      .replace(/é/g,'e').replace(/ě/g,'e').replace(/í/g,'i')
      .replace(/ň/g,'n').replace(/ó/g,'o').replace(/ř/g,'r')
      .replace(/š/g,'s').replace(/ť/g,'t').replace(/ú/g,'u')
      .replace(/ů/g,'u').replace(/ý/g,'y').replace(/ž/g,'z')
      .trim();
  }

  // Formátování výsledku — celá čísla bez desetinných míst
  function formatNum(n) {
    if (!isFinite(n)) return null;
    return Number.isInteger(n) ? String(n) : parseFloat(n.toFixed(8)).toString();
  }

  // Hlavní matematická funkce
  function tryMath(raw) {
    let s = raw.trim().toLowerCase();

    // Nahrazení čárky tečkou (desetinná čárka)
    s = s.replace(/,/g, '.');

    // odmocnina X  nebo  sqrt X
    let m = s.match(/^(?:odmocnina|sqrt)\s+([\d.]+)$/);
    if (m) {
      const n = parseFloat(m[1]);
      const r = Math.sqrt(n);
      const res = formatNum(r);
      return res ? `√${n} = ${res} ♡` : null;
    }

    // X-tá odmocnina z Y  →  např. "3 odmocnina z 27"
    m = s.match(/^([\d.]+)[.\s]*odmocnina\s+(?:z\s+)?([\d.]+)$/);
    if (m) {
      const deg = parseFloat(m[1]), n = parseFloat(m[2]);
      const r = Math.pow(n, 1/deg);
      const res = formatNum(r);
      return res ? `${deg}. odmocnina z ${n} = ${res} ♡` : null;
    }

    // mocnina: X^Y  nebo  X**Y  nebo  "X na Y"
    m = s.match(/^([\d.]+)\s*(?:\^|\*\*|na)\s*([\d.]+)$/);
    if (m) {
      const a = parseFloat(m[1]), b = parseFloat(m[2]);
      const r = Math.pow(a, b);
      const res = formatNum(r);
      return res ? `${a}^${b} = ${res} ♡` : null;
    }

    // X% z Y  nebo  X procent z Y
    m = s.match(/^([\d.]+)\s*(?:%|procent)\s+z\s+([\d.]+)$/);
    if (m) {
      const pct = parseFloat(m[1]), base = parseFloat(m[2]);
      const r = (pct / 100) * base;
      return `${pct}% z ${base} = ${parseFloat(r.toFixed(6))} ♡`;
    }

    // log X  nebo  log(X)
    m = s.match(/^log\s*\(?([\d.]+)\)?$/);
    if (m) {
      const n = parseFloat(m[1]);
      const res = formatNum(Math.log10(n));
      return res ? `log(${n}) = ${res} ♡` : null;
    }

    // ln X
    m = s.match(/^ln\s*\(?([\d.]+)\)?$/);
    if (m) {
      const n = parseFloat(m[1]);
      const res = formatNum(Math.log(n));
      return res ? `ln(${n}) = ${res} ♡` : null;
    }

    // Slovní operátory → znaky
    s = s
      .replace(/\bkrát\b/g, '*')
      .replace(/\bděleno\b/g, '/')
      .replace(/\bplus\b/g, '+')
      .replace(/\bmínus\b|\bminus\b/g, '-')
      .replace(/\bmod\b/g, '%');

    // Nahrazení symbolů √ a π v textu
    s = s.replace(/√([\d.]+)/g, (_, n) => Math.sqrt(parseFloat(n)));
    s = s.replace(/π|pi/g, Math.PI);

    // Jen čistý matematický výraz (čísla + operátory + závorky)
    if (!/^[\d\s+\-*/%.()^]+$/.test(s)) return null;

    // ^ na mocninu
    s = s.replace(/(\d+(?:\.\d+)?)\s*\^\s*(\d+(?:\.\d+)?)/g,
      (_, a, b) => Math.pow(parseFloat(a), parseFloat(b)));

    try {
      // eslint-disable-next-line no-new-func
      const result = Function('"use strict"; return (' + s + ')')();
      if (typeof result !== 'number' || !isFinite(result)) return null;
      const res = formatNum(result);
      return res ? `${raw.trim()} = ${res} ♡` : null;
    } catch(e) {
      return null;
    }
  }

  function handleSend() {
    if (teachingMode) return;
    const raw = input.value.trim();
    if (!raw) return;
    input.value = "";

    addMsg(raw, "user");
    spawnHeart();

    const zprava = raw.toLowerCase().trim();
    const norm = normalize(zprava);

    if (zprava === "konec") {
      addMsg("Ahoj! ♥ Brzy na shledanou!", "bot");
      input.disabled = true;
      sendBtn.disabled = true;
      return;
    }

    // 1. Zkus matematický výpočet
    const mathResult = tryMath(raw);
    if (mathResult) {
      addMsg(mathResult, "bot");
      return;
    }

    // 2. Zkus normalizovaný klíč (bez diakritiky)
    const normKey = Object.keys(odpovedi).find(k => normalize(k) === norm);
    if (normKey) {
      addMsg(odpovedi[normKey], "bot");
      return;
    }

    // 3. Přesná shoda
    if (odpovedi[zprava]) {
      addMsg(odpovedi[zprava], "bot");
      return;
    }

    // 4. Teaching mode
    pendingMessage = zprava;
    teachingMode = true;
    showTeachBox();
  }

  sendBtn.addEventListener("click", handleSend);
  input.addEventListener("keydown", e => { if (e.key === "Enter") handleSend(); });

  addMsg("Ahoj! ♥ Jsem tvůj chatbot. Umím matiku, českou gramatiku i literaturu. Na co se chceš zeptat?", "bot");
</script>
